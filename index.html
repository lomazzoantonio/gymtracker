<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>GymTracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}
  #root{max-width:430px;margin:0 auto;min-height:100vh;background:#f8fafc;}
  input[type=number]{-moz-appearance:textfield;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .btn{display:inline-flex;align-items:center;justify-content:center;background:#f1f5f9;color:#1e293b;border:1px solid #e2e8f0;border-radius:10px;padding:10px 18px;font-weight:500;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
  .btn:active{opacity:.75;}
  .btn-w{width:100%;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px 16px;margin-bottom:10px;}
  .lbl{font-size:12px;color:#64748b;margin-bottom:5px;display:block;}
  .inp{width:100%;padding:11px 13px;border:1px solid #e2e8f0;border-radius:10px;font-size:15px;background:#f8fafc;color:#1e293b;font-family:inherit;}
  .inp:focus{outline:none;border-color:#94a3b8;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .pb-badge{display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #fbbf24;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:5px;vertical-align:middle;}
  .hist-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f1f5f9;}
  .hist-row:last-child{border-bottom:none;}
  .trend-up{color:#16a34a;font-size:11px;font-weight:700;}
  .trend-eq{color:#64748b;font-size:11px;}
  .trend-dn{color:#dc2626;font-size:11px;font-weight:700;}
  .cardio-card{background:#f0f9ff;border:1px solid #bae6fd;border-radius:14px;padding:14px 16px;margin-bottom:10px;}
  .type-btn{border:1px solid #e2e8f0;border-radius:9px;padding:7px 4px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;background:#f8fafc;color:#475569;font-family:inherit;transition:all .15s;}
  .type-btn.active{background:#0ea5e9;color:#fff;border-color:#0ea5e9;}
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .confirm-sheet{background:#fff;width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:24px 20px 36px;}
  .pick-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .pick-sheet{background:#fff;width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:24px 20px 36px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useRef}=React,h=React.createElement;

const TYPES=["Gambe","Braccia","Spalle","Petto","Dorso","Personalizzato"];
const TH={
  Gambe:         {a:"#639922",bg:"#EAF3DE",tx:"#27500A"},
  Braccia:       {a:"#378ADD",bg:"#E6F1FB",tx:"#0C447C"},
  Spalle:        {a:"#EF9F27",bg:"#FAEEDA",tx:"#633806"},
  Petto:         {a:"#D85A30",bg:"#FAECE7",tx:"#4A1B0C"},
  Dorso:         {a:"#7F77DD",bg:"#EEEDFE",tx:"#3C3489"},
  Personalizzato:{a:"#1D9E75",bg:"#E1F5EE",tx:"#085041"},
};
const MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const DAYS=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const CARDIO_TYPES=[
  {id:"cardio", label:"Cardio",  icon:"🏃"},
  {id:"corsa",  label:"Corsa",   icon:"👟"},
  {id:"bici",   label:"Bici",    icon:"🚴"},
];

function todayStr(){return new Date().toISOString().split("T")[0];}
function dateStr(y,m,d){return`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function fmtMin(m){if(!m)return"-";return m<60?`${m}m`:`${Math.floor(m/60)}h${m%60?m%60+"m":""}`;}
function fmtDateLabel(ds){const[y,m,d]=ds.split("-");return`${d}/${m}/${y}`;}
function loadLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// cardio summary label for a workout
function cardioLabel(w){
  if(!w.cardioType)return null;
  const ct=CARDIO_TYPES.find(c=>c.id===w.cardioType);
  const icon=ct?ct.icon:"🏃";
  const base=`${icon} ${ct?ct.label:"Cardio"}`;
  const parts=[];
  if(w.cardio>0)parts.push(`${w.cardio}m`);
  if(w.cardioType==="corsa"&&w.cardioKm>0)parts.push(`${w.cardioKm}km`);
  return parts.length?`${base} ${parts.join(" · ")}`:base;
}

function getPersonalBest(workouts,exName,excludeId=null){
  let best=0;
  workouts.filter(w=>w.id!==excludeId).forEach(w=>w.exercises.forEach(ex=>{
    if(ex.name.toLowerCase()===exName.toLowerCase())ex.sets.forEach(s=>{if(s.kg>best)best=s.kg;});
  }));
  return best;
}
function getLastSessions(workouts,type,excludeId=null,n=2){
  return workouts.filter(w=>w.type===type&&w.id!==excludeId).sort((a,b)=>b.id-a.id).slice(0,n);
}
function getTrend(workouts,activeExercises,exName,excludeId){
  const cur=activeExercises.filter(ex=>ex.name.toLowerCase()===exName.toLowerCase()).flatMap(ex=>ex.sets).reduce((m,s)=>Math.max(m,s.kg),0);
  if(!cur)return null;
  const prev=workouts.filter(w=>w.id!==excludeId).flatMap(w=>w.exercises.filter(ex=>ex.name.toLowerCase()===exName.toLowerCase())).flatMap(ex=>ex.sets).reduce((m,s)=>Math.max(m,s.kg),0);
  if(!prev)return null;
  return cur>prev?"up":cur===prev?"eq":"dn";
}

// ── CONFIRM DIALOG ──
function ConfirmSheet({title,msg,confirmLabel,confirmColor,onConfirm,onCancel}){
  return h("div",{className:"confirm-overlay",onClick:onCancel},
    h("div",{className:"confirm-sheet",onClick:e=>e.stopPropagation()},
      h("p",{style:{fontWeight:700,fontSize:17,marginBottom:8}},title),
      h("p",{style:{fontSize:14,color:"#64748b",marginBottom:24}},msg),
      h("div",{className:"g2"},
        h("button",{className:"btn btn-w",onClick:onCancel},"Annulla"),
        h("button",{className:"btn btn-w",onClick:onConfirm,style:{background:confirmColor||"#ef4444",color:"#fff",border:"none"}},confirmLabel||"Conferma")
      )
    )
  );
}

// ── TYPE PICKER SHEET (for adding workout from calendar) ──
function TypePickerSheet({date,onPick,onCancel}){
  return h("div",{className:"pick-overlay",onClick:onCancel},
    h("div",{className:"pick-sheet",onClick:e=>e.stopPropagation()},
      h("p",{style:{fontWeight:700,fontSize:17,marginBottom:4}},"Aggiungi allenamento"),
      h("p",{style:{fontSize:13,color:"#64748b",marginBottom:18}},fmtDateLabel(date)),
      h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        TYPES.map(type=>{
          const t=TH[type];
          return h("button",{key:type,onClick:()=>onPick(type),style:{display:"flex",alignItems:"center",padding:"13px 14px",background:"#fff",border:"1px solid #e2e8f0",borderLeft:`4px solid ${t.a}`,borderRadius:12,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}},
            h("div",{style:{width:9,height:9,borderRadius:"50%",background:t.a,marginRight:12,flexShrink:0}}),
            h("span",{style:{fontWeight:600,fontSize:15,color:"#0f172a"}},type)
          );
        })
      )
    )
  );
}

// ── HOME ──
function Home({workouts,onStart,onCal,onExport,onImport}){
  const fileRef=useRef();
  return h("div",{style:{padding:"20px 16px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
      h("div",null,
        h("h1",{style:{fontSize:22,fontWeight:700,color:"#0f172a"}},"GymTracker"),
        h("p",{style:{fontSize:13,color:"#64748b",marginTop:3}},"Scegli il tuo allenamento")
      ),
      h("button",{className:"btn",onClick:onCal,style:{padding:"8px 14px"}},"Calendario")
    ),
    TYPES.map(type=>{
      const t=TH[type],count=workouts.filter(w=>w.type===type).length;
      return h("button",{key:type,onClick:()=>onStart(type),style:{display:"flex",alignItems:"center",width:"100%",padding:"16px",marginBottom:10,background:"#fff",border:"1px solid #e2e8f0",borderLeft:`4px solid ${t.a}`,borderRadius:14,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}},
        h("div",{style:{width:10,height:10,borderRadius:"50%",background:t.a,marginRight:14,flexShrink:0}}),
        h("div",{style:{flex:1}},
          h("div",{style:{fontWeight:600,fontSize:16,color:"#0f172a"}},type),
          h("div",{style:{fontSize:12,color:"#94a3b8",marginTop:2}},count===0?"Nessun allenamento":`${count} allenament${count===1?"o":"i"}`)
        ),
        h("span",{style:{color:"#cbd5e1",fontSize:20}},"›")
      );
    }),
    h("div",{style:{marginTop:8,borderTop:"1px solid #e2e8f0",paddingTop:16}},
      h("p",{style:{fontSize:12,color:"#94a3b8",marginBottom:10,textAlign:"center"}},"Backup dati"),
      h("div",{className:"g2"},
        h("button",{className:"btn btn-w",onClick:onExport,style:{fontSize:13}},"↓ Esporta"),
        h("button",{className:"btn btn-w",onClick:()=>fileRef.current.click(),style:{fontSize:13}},"↑ Importa")
      ),
      h("input",{ref:fileRef,type:"file",accept:".json",style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>onImport(ev.target.result);r.readAsText(f);}e.target.value="";}})
    )
  );
}

// ── HISTORY PANEL ──
function HistoryPanel({sessions,accentColor,bg,tx}){
  const[open,setOpen]=useState(true);
  if(!sessions.length)return null;
  return h("div",{style:{background:bg,border:`1px solid ${accentColor}30`,borderRadius:14,marginBottom:14,overflow:"hidden"}},
    h("button",{onClick:()=>setOpen(o=>!o),style:{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit"}},
      h("span",{style:{fontWeight:600,fontSize:14,color:tx}},"Ultime "+(sessions.length===1?"sessione":"2 sessioni")),
      h("span",{style:{color:tx,fontSize:16,display:"inline-block",transform:open?"rotate(180deg)":"rotate(0)"}},"▾")
    ),
    open&&h("div",{style:{padding:"0 14px 12px"}},
      sessions.map((s,si)=>
        h("div",{key:si,style:{marginBottom:si<sessions.length-1?14:0}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
            h("p",{style:{fontSize:12,fontWeight:700,color:tx}},fmtDateLabel(s.date)),
            h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}},
              s.duration&&h("span",{style:{fontSize:11,color:tx,opacity:.8}},fmtMin(s.duration)),
              s.calories&&h("span",{style:{fontSize:11,color:tx,opacity:.8}},`${s.calories}kcal`),
              s.cardioType&&h("span",{style:{fontSize:11,color:"#0369a1",background:"#e0f2fe",borderRadius:6,padding:"1px 6px",fontWeight:600}},cardioLabel(s))
            )
          ),
          s.exercises.map((ex,ei)=>
            h("div",{key:ei,className:"hist-row"},
              h("span",{style:{fontSize:13,fontWeight:500,color:tx,flexShrink:0,marginRight:10}},ex.name),
              h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}},
                ex.sets.map((set,si2)=>h("span",{key:si2,style:{fontSize:12,color:tx,opacity:.85}},`${set.kg}×${set.reps}`))
              )
            )
          )
        )
      )
    )
  );
}

// ── CARDIO SECTION ──
function CardioSection({active,setActive}){
  const ct=active.cardioType||null;
  const mins=active.cardio||0;
  const km=active.cardioKm||0;

  function setType(id){setActive({...active,cardioType:id,cardio:mins,cardioKm:id==="corsa"?km:0});}
  function removeCa(){setActive({...active,cardioType:null,cardio:0,cardioKm:0});}

  if(!ct)return h("button",{className:"btn btn-w",onClick:()=>setType("cardio"),style:{marginBottom:10,border:"1px dashed #0ea5e9",color:"#0ea5e9",background:"transparent"}},"+  Cardio");

  return h("div",{className:"cardio-card"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("span",{style:{fontWeight:600,fontSize:15,color:"#0369a1"}},"Cardio"),
      h("button",{onClick:removeCa,style:{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:18}},"×")
    ),
    // tipo
    h("div",{className:"g3",style:{marginBottom:12}},
      CARDIO_TYPES.map(c=>h("button",{key:c.id,className:`type-btn${ct===c.id?" active":""}`,onClick:()=>setType(c.id)},
        h("div",{style:{fontSize:18,marginBottom:2}},c.icon),
        c.label
      ))
    ),
    // minuti
    h("div",{style:{marginBottom:ct==="corsa"?10:0}},
      h("label",{className:"lbl"},"Minuti"),
      h("input",{className:"inp",type:"number",value:mins||"",placeholder:"0",onChange:e=>setActive({...active,cardio:parseInt(e.target.value)||0}),style:{textAlign:"center",fontWeight:700,fontSize:18}})
    ),
    // km — solo per corsa
    ct==="corsa"&&h("div",null,
      h("label",{className:"lbl"},"Chilometri"),
      h("input",{className:"inp",type:"number",value:km||"",placeholder:"0.0",step:"0.1",onChange:e=>setActive({...active,cardioKm:parseFloat(e.target.value)||0}),style:{textAlign:"center",fontWeight:700,fontSize:18}})
    )
  );
}

// ── WORKOUT ──
function Workout({active,setActive,lib,allWorkouts,editingId,onFinish,onBack}){
  const[addEx,setAddEx]=useState(false);
  const[addSet,setAddSet]=useState(null);
  const[exName,setExName]=useState("");
  const[exKg,setExKg]=useState("");
  const[exReps,setExReps]=useState("");
  const[showSugg,setShowSugg]=useState(false);
  const t=TH[active.type];
  const suggs=lib[active.type]||[];
  const filtered=exName?suggs.filter(s=>s.toLowerCase().includes(exName.toLowerCase())):suggs;
  const lastSessions=getLastSessions(allWorkouts,active.type,editingId,2);

  function doAddEx(){
    if(!exName.trim()||!exKg||!exReps)return;
    setActive({...active,exercises:[...active.exercises,{name:exName.trim(),sets:[{kg:parseFloat(exKg),reps:parseInt(exReps)}]}]});
    setExName("");setExKg("");setExReps("");setAddEx(false);setShowSugg(false);
  }
  function openAddSet(i){const last=active.exercises[i].sets.slice(-1)[0];setAddSet({i,kg:String(last.kg),reps:String(last.reps)});}
  function doAddSet(){
    const{i,kg,reps}=addSet;
    setActive({...active,exercises:active.exercises.map((ex,idx)=>idx!==i?ex:{...ex,sets:[...ex.sets,{kg:parseFloat(kg),reps:parseInt(reps)}]})});
    setAddSet(null);
  }
  function delSet(ei,si){
    setActive({...active,exercises:active.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.filter((_,j)=>j!==si)}).filter(ex=>ex.sets.length>0)});
  }
  function isPB(exName,kg){const pb=getPersonalBest(allWorkouts,exName,editingId);return kg>0&&kg>=pb&&pb>0;}

  const canFinish=active.exercises.length>0||(active.cardioType&&(active.cardio>0||active.cardioKm>0));

  return h("div",null,
    h("div",{style:{background:t.bg,borderBottom:`2px solid ${t.a}`,padding:"14px 16px"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
        h("button",{className:"btn",onClick:onBack,style:{padding:"6px 12px",background:"transparent",border:`1px solid ${t.a}`,color:t.tx}},"←"),
        h("div",null,
          h("p",{style:{fontWeight:600,fontSize:17,color:t.tx}},editingId?"Modifica — "+active.type:`Allenamento ${active.type}`),
          h("p",{style:{fontSize:12,color:t.tx,opacity:.7,marginTop:2}},active.date)
        )
      )
    ),
    h("div",{style:{padding:"14px 16px"}},
      h(HistoryPanel,{sessions:lastSessions,accentColor:t.a,bg:t.bg,tx:t.tx}),
      active.exercises.map((ex,ei)=>{
        const trend=getTrend(allWorkouts,active.exercises,ex.name,editingId);
        const trendEl=trend==="up"?h("span",{className:"trend-up"},"▲ PB"):trend==="eq"?h("span",{className:"trend-eq"},"= Uguale"):trend==="dn"?h("span",{className:"trend-dn"},"▼ Meno"):null;
        return h("div",{key:ei,className:"card",style:{borderLeft:`3px solid ${t.a}`}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
              h("span",{style:{fontWeight:600,fontSize:15}},ex.name),trendEl
            ),
            h("button",{className:"btn",onClick:()=>openAddSet(ei),style:{padding:"5px 12px",fontSize:13,background:t.a,color:"#fff",border:"none",flexShrink:0}},"+  serie")
          ),
          h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
            ex.sets.map((set,si)=>h("span",{key:si,onClick:()=>delSet(ei,si),style:{background:t.bg,color:t.tx,border:`1px solid ${t.a}40`,borderRadius:8,padding:"5px 10px",fontSize:13,fontWeight:600,cursor:"pointer"}},
              `${set.kg}kg × ${set.reps}`,isPB(ex.name,set.kg)&&h("span",{className:"pb-badge"},"PB")
            ))
          ),
          h("p",{style:{fontSize:11,color:"#94a3b8",marginTop:6}},"Tocca una serie per rimuoverla")
        );
      }),
      addSet!==null&&h("div",{className:"card",style:{border:`1px solid ${t.a}`}},
        h("p",{style:{fontWeight:600,fontSize:14,marginBottom:12}},`Nuova serie — ${active.exercises[addSet.i]?.name}`),
        h("div",{className:"g2",style:{marginBottom:10}},
          h("div",null,h("label",{className:"lbl"},"Kg"),h("input",{className:"inp",type:"number",value:addSet.kg,onChange:e=>setAddSet({...addSet,kg:e.target.value})})),
          h("div",null,h("label",{className:"lbl"},"Ripetizioni"),h("input",{className:"inp",type:"number",value:addSet.reps,onChange:e=>setAddSet({...addSet,reps:e.target.value})}))
        ),
        h("div",{className:"g2"},
          h("button",{className:"btn btn-w",onClick:()=>setAddSet(null)},"Annulla"),
          h("button",{className:"btn btn-w",onClick:doAddSet,style:{background:t.a,color:"#fff",border:"none"}},"Conferma")
        )
      ),
      addEx?h("div",{className:"card",style:{border:`1px solid ${t.a}`}},
        h("p",{style:{fontWeight:600,fontSize:14,marginBottom:12}},"Nuovo esercizio"),
        h("div",{style:{position:"relative",marginBottom:10}},
          h("label",{className:"lbl"},"Nome esercizio"),
          h("input",{className:"inp",value:exName,placeholder:"es. Squat",onChange:e=>{setExName(e.target.value);setShowSugg(true);},onFocus:()=>setShowSugg(true),onBlur:()=>setTimeout(()=>setShowSugg(false),160)}),
          showSugg&&filtered.length>0&&h("div",{style:{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,marginTop:4,zIndex:10,boxShadow:"0 4px 12px rgba(0,0,0,.08)"}},
            filtered.slice(0,5).map((sg,i)=>{
              const pb=getPersonalBest(allWorkouts,sg,editingId);
              return h("div",{key:i,onMouseDown:()=>{setExName(sg);setShowSugg(false);},style:{padding:"10px 13px",fontSize:14,cursor:"pointer",borderBottom:i<Math.min(filtered.length,5)-1?"1px solid #f1f5f9":"none",display:"flex",justifyContent:"space-between",alignItems:"center"}},
                h("span",null,sg),pb>0&&h("span",{style:{fontSize:11,color:"#94a3b8"}},`Max: ${pb}kg`)
              );
            })
          )
        ),
        h("div",{className:"g2",style:{marginBottom:10}},
          h("div",null,h("label",{className:"lbl"},"Kg"),h("input",{className:"inp",type:"number",value:exKg,placeholder:"0",onChange:e=>setExKg(e.target.value)})),
          h("div",null,h("label",{className:"lbl"},"Ripetizioni"),h("input",{className:"inp",type:"number",value:exReps,placeholder:"0",onChange:e=>setExReps(e.target.value)}))
        ),
        h("div",{className:"g2"},
          h("button",{className:"btn btn-w",onClick:()=>{setAddEx(false);setExName("");setExKg("");setExReps("");}  },"Annulla"),
          h("button",{className:"btn btn-w",onClick:doAddEx,style:{background:t.a,color:"#fff",border:"none"}},"Aggiungi")
        )
      ):h("button",{className:"btn btn-w",onClick:()=>setAddEx(true),style:{marginBottom:10,border:`1px dashed ${t.a}`,color:t.a,background:"transparent"}},"+  Aggiungi esercizio"),

      h(CardioSection,{active,setActive}),

      canFinish&&h("button",{className:"btn btn-w",onClick:onFinish,style:{marginTop:4,background:"#0f172a",color:"#fff",border:"none",padding:"13px",fontWeight:600,fontSize:15}},editingId?"Salva modifiche":"Termina allenamento")
    )
  );
}

// ── FINISH ──
function Finish({active,editingId,onSave,onBack}){
  const[dur,setDur]=useState(active.duration?String(active.duration):"");
  const[kcal,setKcal]=useState(active.calories?String(active.calories):"");
  const t=TH[active.type];
  const totalSets=active.exercises.reduce((s,ex)=>s+ex.sets.length,0);
  const hasCa=active.cardioType&&(active.cardio>0||active.cardioKm>0);
  const cols=2+(hasCa?1:0);
  return h("div",{style:{padding:"20px 16px"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      h("button",{className:"btn",onClick:onBack,style:{padding:"6px 12px"}},"←"),
      h("p",{style:{fontWeight:600,fontSize:17}},editingId?"Modifica dati":"Fine allenamento")
    ),
    h("div",{className:"card",style:{background:t.bg,border:`1px solid ${t.a}30`,marginBottom:14}},
      h("p",{style:{fontWeight:600,color:t.tx,marginBottom:12}},`Riepilogo ${active.type}`),
      h("div",{style:{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:8}},
        h("div",{style:{textAlign:"center",padding:"10px 0"}},h("div",{style:{fontSize:22,fontWeight:700,color:t.tx}},active.exercises.length),h("div",{style:{fontSize:12,color:t.tx,opacity:.7}},"Esercizi")),
        h("div",{style:{textAlign:"center",padding:"10px 0"}},h("div",{style:{fontSize:22,fontWeight:700,color:t.tx}},totalSets),h("div",{style:{fontSize:12,color:t.tx,opacity:.7}},"Serie")),
        hasCa&&h("div",{style:{textAlign:"center",padding:"10px 0"}},
          h("div",{style:{fontSize:active.cardioType==="corsa"&&active.cardioKm>0?16:22,fontWeight:700,color:"#0369a1"}},
            active.cardio>0?fmtMin(active.cardio):"-",
            active.cardioType==="corsa"&&active.cardioKm>0&&h("span",{style:{fontSize:13,display:"block",marginTop:1}},`${active.cardioKm}km`)
          ),
          h("div",{style:{fontSize:12,color:"#0369a1",opacity:.8}},CARDIO_TYPES.find(c=>c.id===active.cardioType)?.label||"Cardio")
        )
      )
    ),
    h("div",{className:"card"},
      h("p",{style:{fontWeight:600,marginBottom:14}},"Dati allenamento"),
      h("div",{style:{marginBottom:12}},h("label",{className:"lbl"},"Durata totale (minuti)"),h("input",{className:"inp",type:"number",value:dur,placeholder:"es. 75",onChange:e=>setDur(e.target.value)})),
      h("div",null,h("label",{className:"lbl"},"Calorie bruciate (kcal)"),h("input",{className:"inp",type:"number",value:kcal,placeholder:"es. 400",onChange:e=>setKcal(e.target.value)}))
    ),
    h("button",{className:"btn btn-w",onClick:()=>onSave(parseInt(dur)||0,parseInt(kcal)||0),style:{background:t.a,color:"#fff",border:"none",padding:"13px",fontWeight:600,fontSize:15}},editingId?"Salva modifiche":"Salva allenamento")
  );
}

// ── CALENDAR ──
function Cal({workouts,onBack,onEdit,onDelete,onAddForDate}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[sel,setSel]=useState(null);
  const[confirmDel,setConfirmDel]=useState(null);
  const[showPicker,setShowPicker]=useState(false);

  const daysInMo=new Date(yr,mo+1,0).getDate();
  const firstMon=(new Date(yr,mo,1).getDay()+6)%7;
  const cells=[...Array(firstMon).fill(null),...Array.from({length:daysInMo},(_,i)=>i+1)];
  while(cells.length%7!==0)cells.push(null);
  const weeks=Array.from({length:cells.length/7},(_,i)=>cells.slice(i*7,i*7+7));

  const moStr=`${yr}-${String(mo+1).padStart(2,"0")}`;
  const moWks=workouts.filter(w=>w.date.startsWith(moStr));
  const moTime=moWks.reduce((s,w)=>s+(w.duration||0),0);
  const moCals=moWks.reduce((s,w)=>s+(w.calories||0),0);
  const moKm=moWks.reduce((s,w)=>s+(w.cardioType==="corsa"?w.cardioKm||0:0),0);

  function getDW(day){return!day?[]:workouts.filter(w=>w.date===dateStr(yr,mo,day));}
  function wkStats(wk){
    return wk.reduce((acc,day)=>{
      getDW(day).forEach(w=>{
        acc.t+=w.duration||0;
        acc.c+=w.calories||0;
        if(w.cardioType==="corsa")acc.km+=w.cardioKm||0;
      });
      return acc;
    },{t:0,c:0,km:0});
  }
  const today=todayStr();
  const selWks=sel?getDW(sel):[];
  const selDate=sel?dateStr(yr,mo,sel):null;

  function prevMo(){if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);setSel(null);}
  function nextMo(){if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);setSel(null);}

  return h("div",{style:{padding:"14px 16px"}},
    confirmDel&&h(ConfirmSheet,{
      title:"Elimina allenamento",
      msg:`Vuoi eliminare l'allenamento ${confirmDel.type} del ${fmtDateLabel(confirmDel.date)}? L'operazione non è reversibile.`,
      confirmLabel:"Elimina",confirmColor:"#ef4444",
      onConfirm:()=>{
        onDelete(confirmDel.id);
        setConfirmDel(null);
        const remaining=workouts.filter(w=>w.date===confirmDel.date&&w.id!==confirmDel.id);
        if(!remaining.length)setSel(null);
      },
      onCancel:()=>setConfirmDel(null)
    }),
    showPicker&&selDate&&h(TypePickerSheet,{
      date:selDate,
      onPick:(type)=>{setShowPicker(false);onAddForDate(type,selDate);},
      onCancel:()=>setShowPicker(false)
    }),

    h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14}},
      h("button",{className:"btn",onClick:onBack,style:{padding:"6px 12px"}},"←"),
      h("p",{style:{fontWeight:600,fontSize:17}},"Calendario")
    ),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("button",{className:"btn",onClick:prevMo,style:{padding:"6px 14px",fontSize:16}},"‹"),
      h("div",{style:{textAlign:"center"}},
        h("p",{style:{fontWeight:600,fontSize:16}},`${MONTHS[mo]} ${yr}`),
        h("p",{style:{fontSize:12,color:"#64748b",marginTop:2}},
          [moTime?fmtMin(moTime):null,moCals?`${moCals} kcal`:null,moKm>0?`${moKm}km corsa`:null].filter(Boolean).join("  ·  ")||"Nessun allenamento"
        )
      ),
      h("button",{className:"btn",onClick:nextMo,style:{padding:"6px 14px",fontSize:16}},"›")
    ),

    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr) 58px",gap:2,marginBottom:4}},
      ...DAYS.map(d=>h("div",{key:d,style:{textAlign:"center",fontSize:10,fontWeight:600,color:"#94a3b8",padding:"3px 0"}},d)),
      h("div",{style:{textAlign:"center",fontSize:10,fontWeight:600,color:"#94a3b8",padding:"3px 0"}},"Sett.")
    ),

    ...weeks.map((wk,wi)=>{
      const st=wkStats(wk);
      return h("div",{key:wi,style:{display:"grid",gridTemplateColumns:"repeat(7,1fr) 58px",gap:2,marginBottom:2}},
        ...wk.map((day,di)=>{
          const dws=getDW(day),ds=day?dateStr(yr,mo,day):null;
          const isToday=ds===today,isSel=sel===day&&day;
          const hasCardio=dws.some(w=>w.cardioType);
          return h("div",{key:di,onClick:()=>day&&setSel(isSel?null:day),style:{minHeight:46,borderRadius:10,padding:"4px 2px",cursor:day?"pointer":"default",display:"flex",flexDirection:"column",alignItems:"center",background:isSel?"#dbeafe":(isToday?"#f0fdf4":"#fff"),border:isToday?"1.5px solid #22c55e":"1px solid #e2e8f0"}},
            day&&h("span",{style:{fontSize:12,fontWeight:isToday?700:400,color:isSel?"#1d4ed8":(isToday?"#166534":"#1e293b")}},day),
            day&&h("div",{style:{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:2,marginTop:2}},
              dws.map((w,i)=>h("div",{key:i,style:{width:6,height:6,borderRadius:"50%",background:TH[w.type]?.a}})),
              hasCardio&&h("div",{style:{width:6,height:6,borderRadius:"50%",background:"#0ea5e9"}})
            )
          );
        }),
        // week summary box — show km if any
        h("div",{style:{minHeight:46,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:4,gap:1}},
          h("span",{style:{fontSize:9,color:"#64748b",textAlign:"center"}},fmtMin(st.t)),
          h("span",{style:{fontSize:9,color:"#64748b"}},st.c?`${st.c}kc`:"-"),
          st.km>0&&h("span",{style:{fontSize:9,color:"#0369a1",fontWeight:600}},`${st.km}km`)
        )
      );
    }),

    h("div",{style:{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",padding:"10px 0"}},
      TYPES.map(type=>h("div",{key:type,style:{display:"flex",alignItems:"center",gap:4}},
        h("div",{style:{width:8,height:8,borderRadius:"50%",background:TH[type].a}}),
        h("span",{style:{fontSize:11,color:"#64748b"}},type)
      )),
      h("div",{style:{display:"flex",alignItems:"center",gap:4}},
        h("div",{style:{width:8,height:8,borderRadius:"50%",background:"#0ea5e9"}}),
        h("span",{style:{fontSize:11,color:"#64748b"}},"Cardio")
      )
    ),

    // Day detail
    sel&&h("div",{className:"card",style:{borderTop:"3px solid #3b82f6",marginTop:4}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("p",{style:{fontWeight:600,fontSize:15}},`${String(sel).padStart(2,"0")}/${String(mo+1).padStart(2,"0")}/${yr}`),
        h("button",{onClick:()=>setShowPicker(true),style:{display:"flex",alignItems:"center",gap:5,background:"#f0fdf4",border:"1px solid #86efac",borderRadius:9,padding:"6px 12px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#166534",fontFamily:"inherit"}},
          h("span",{style:{fontSize:15}},"＋"),"Allenamento"
        )
      ),
      selWks.length===0
        ?h("p",{style:{color:"#94a3b8",fontSize:14}},"Nessun allenamento. Aggiungine uno!")
        :selWks.map((w,i)=>{
          const t=TH[w.type];
          const cl=cardioLabel(w);
          return h("div",{key:i,style:{marginBottom:i<selWks.length-1?20:0}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
              h("div",null,
                h("span",{style:{fontWeight:700,fontSize:15,borderLeft:`3px solid ${t.a}`,paddingLeft:10}},w.type),
                h("div",{style:{display:"flex",gap:6,marginTop:5,paddingLeft:10,flexWrap:"wrap"}},
                  cl&&h("span",{style:{fontSize:11,background:"#e0f2fe",color:"#0369a1",borderRadius:6,padding:"2px 7px",fontWeight:600}},cl),
                  (w.duration||w.calories)&&h("span",{style:{fontSize:11,color:"#94a3b8"}},`${w.duration?fmtMin(w.duration):""}${w.duration&&w.calories?" · ":""}${w.calories?w.calories+" kcal":""}`)
                )
              ),
              h("div",{style:{display:"flex",gap:6,flexShrink:0}},
                h("button",{onClick:()=>onEdit(w),style:{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#374151"}},"✏️"),
                h("button",{onClick:()=>setConfirmDel(w),style:{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#dc2626"}},"🗑")
              )
            ),
            h("div",{style:{paddingLeft:10}},
              w.exercises.map((ex,ei)=>h("div",{key:ei,style:{marginBottom:6}},
                h("span",{style:{fontSize:13,fontWeight:600}},ex.name),
                h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginTop:3}},
                  ex.sets.map((set,si)=>h("span",{key:si,style:{background:t.bg,color:t.tx,borderRadius:8,padding:"2px 8px",fontSize:12,fontWeight:600}},`${set.kg}kg×${set.reps}`))
                )
              ))
            )
          );
        })
    )
  );
}

// ── MAIN ──
function GymApp(){
  const[screen,setScreen]=useState("home");
  const[prevScreen,setPrevScreen]=useState("home");
  const[workouts,setWorkouts]=useState(()=>loadLS("gym_w",[]));
  const[lib,setLib]=useState(()=>loadLS("gym_e",{}));
  const[active,setActive]=useState(null);
  const[editingId,setEditingId]=useState(null);

  function saveW(data){setWorkouts(data);saveLS("gym_w",data);}
  function saveE(data){setLib(data);saveLS("gym_e",data);}

  function goScreen(s,prev){setPrevScreen(prev||screen);setScreen(s);}

  function start(type,date){
    setActive({id:Date.now(),date:date||todayStr(),type,exercises:[],cardioType:null,cardio:0,cardioKm:0});
    setEditingId(null);
    goScreen("workout");
  }

  function addForDate(type,date){
    start(type,date);
    setPrevScreen("calendar");
  }

  function editWorkout(w){
    setActive({...w,cardioType:w.cardioType||null,cardio:w.cardio||0,cardioKm:w.cardioKm||0});
    setEditingId(w.id);
    setPrevScreen("calendar");
    setScreen("workout");
  }

  function deleteWorkout(id){saveW(workouts.filter(w=>w.id!==id));}

  function finish(dur,kcal){
    const w={...active,duration:dur,calories:kcal};
    if(editingId){
      saveW(workouts.map(ex=>ex.id===editingId?w:ex));
    } else {
      const nw=[...workouts,w];
      saveW(nw);
      const nl={...lib};
      w.exercises.forEach(e=>{nl[w.type]=nl[w.type]||[];if(!nl[w.type].includes(e.name))nl[w.type].push(e.name);});
      saveE(nl);
    }
    setActive(null);setEditingId(null);
    setScreen(prevScreen==="calendar"?"calendar":"home");
  }

  function handleExport(){
    const data=JSON.stringify({workouts,lib,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`gymtracker_backup_${todayStr()}.json`;a.click();
    URL.revokeObjectURL(url);
  }
  function handleImport(text){
    try{
      const data=JSON.parse(text);
      if(data.workouts&&Array.isArray(data.workouts))saveW(data.workouts);
      if(data.lib&&typeof data.lib==="object")saveE(data.lib);
      alert(`Importazione completata!\n${data.workouts?.length||0} allenamenti caricati.`);
    }catch{alert("Errore: file non valido.");}
  }

  return h("div",null,
    screen==="home"    &&h(Home,{workouts,onStart:(t)=>start(t),onCal:()=>goScreen("calendar"),onExport:handleExport,onImport:handleImport}),
    screen==="workout" &&h(Workout,{active,setActive,lib,allWorkouts:workouts,editingId,onFinish:()=>goScreen("finish"),onBack:()=>{setActive(null);setEditingId(null);setScreen(prevScreen);}}),
    screen==="finish"  &&h(Finish,{active,editingId,onSave:finish,onBack:()=>goScreen("workout")}),
    screen==="calendar"&&h(Cal,{workouts,onBack:()=>goScreen("home"),onEdit:editWorkout,onDelete:deleteWorkout,onAddForDate:addForDate})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(GymApp,null));
</script>
